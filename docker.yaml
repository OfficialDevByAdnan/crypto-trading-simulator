FROM mcr.microsoft.com/dotnet/sdk:8.0 AS build
WORKDIR /src

COPY CryptoSim.sln .
COPY src/CryptoSim.API/*.csproj ./CryptoSim.API/
COPY src/CryptoSim.Core/*.csproj ./CryptoSim.Core/
COPY src/CryptoSim.Infrastructure/*.csproj ./CryptoSim.Infrastructure/
COPY src/CryptoSim.Tests/*.csproj ./CryptoSim.Tests/

RUN dotnet restore

COPY src/ .
RUN dotnet publish -c Release -o /app/publish

FROM mcr.microsoft.com/dotnet/aspnet:8.0 AS runtime
WORKDIR /app
EXPOSE 80
EXPOSE 443

COPY --from=build /app/publish .
ENTRYPOINT ["dotnet", "CryptoSim.API.dll"]