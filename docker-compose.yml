version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - crypto_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crypto_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CryptoSim;User=sa;Password=Your_password123!;TrustServerCertificate=true
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=YourSuperSecretKeyHereAtLeast32CharactersLong
      - Jwt__Issuer=CryptoSim
      - Jwt__Audience=CryptoSimUsers
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - sqlserver
      - redis
    networks:
      - crypto_network
    restart: always

networks:
  crypto_network:
    driver: bridge

volumes:
  sqlserver_data:
  redis_data: